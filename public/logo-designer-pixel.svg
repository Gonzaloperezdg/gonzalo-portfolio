<svg viewBox="0 0 400 280" xmlns="http://www.w3.org/2000/svg">
  <!-- Circle arc - pixelated style in yellow -->
  <g stroke="#ffff00" stroke-width="12" fill="none" stroke-linecap="round">
    <path d="M 80 100 Q 60 140 80 200" />
  </g>

  <!-- "Designer" text in yellow italic pixelated -->
  <text x="110" y="160" font-family="Arial, sans-serif" font-size="72" font-style="italic" font-weight="900" fill="#ffff00" letter-spacing="-2">Designer</text>

  <!-- Star in yellow pixelated -->
  <g transform="translate(340, 90)">
    <!-- Star path - 5-point star -->
    <polygon points="0,-35 10,-12 38,-12 15,5 23,32 0,15 -23,32 -15,5 -38,-12 -10,-12" fill="#ffff00" stroke="#ffff00" stroke-width="2"/>
  </g>

  <!-- Horizontal line in green -->
  <line x1="50" y1="220" x2="380" y2="220" stroke="#00ff00" stroke-width="4"/>

  <!-- "UX UI DESIGNER" text in green pixelated -->
  <text x="215" y="270" font-family="'Courier New', monospace" font-size="32" font-weight="bold" fill="#00ff00" text-anchor="middle" letter-spacing="3">UX UI DESIGNER</text>
</svg>
